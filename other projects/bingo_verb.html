
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans, system-ui, sans-serif); }
  #app {
    min-height: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #EEF4FB;
    border-radius: 16px;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
  }
  #title-screen { display: flex; flex-direction: column; align-items: center; gap: 2.5rem; }
  #title-text {
    font-size: 64px;
    font-weight: 700;
    color: #1a4a7a;
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.1;
  }
  #title-sub {
    font-size: 18px;
    color: #5a82aa;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .btn-primary {
    background: #1a6bbf;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px 48px;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-primary:hover { background: #1558a0; transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.97); }

  #card-screen { display: none; flex-direction: column; align-items: center; gap: 1.5rem; width: 100%; }

  #top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 560px;
  }
  .btn-secondary {
    background: #fff;
    color: #1a6bbf;
    border: 2px solid #b5d4f4;
    border-radius: 10px;
    padding: 10px 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-secondary:hover { background: #E6F1FB; border-color: #1a6bbf; }
  .btn-secondary:active { transform: scale(0.97); }

  #counter {
    font-size: 16px;
    font-weight: 600;
    color: #5a82aa;
    letter-spacing: 1px;
  }

  #card-area {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #card {
    background: #fff;
    border-radius: 20px;
    width: 100%;
    min-height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(26,75,122,0.13), 0 2px 8px rgba(26,75,122,0.07);
    border: 2px solid #b5d4f4;
    cursor: grab;
    user-select: none;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  #card.dragging { box-shadow: 0 16px 48px rgba(26,75,122,0.18); }
  #card.fly-right {
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
    transform: translateX(140%) rotate(8deg);
    opacity: 0;
  }
  #card.fly-left {
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
    transform: translateX(-140%) rotate(-8deg);
    opacity: 0;
  }
  #card.entrance {
    animation: cardIn 0.3s cubic-bezier(.4,0,.2,1);
  }
  @keyframes cardIn {
    from { transform: scale(0.92) translateY(18px); opacity: 0; }
    to { transform: none; opacity: 1; }
  }

  #verb {
    font-size: 80px;
    font-weight: 700;
    color: #1a4a7a;
    letter-spacing: 2px;
    text-align: center;
    padding: 2rem 2.5rem;
  }

  #card-hint {
    font-size: 13px;
    color: #8aaac8;
    letter-spacing: 1px;
    margin-top: -0.5rem;
  }

  #done-card {
    display: none;
    background: #E1F5EE;
    border: 2px solid #5DCAA5;
    border-radius: 20px;
    width: 100%;
    min-height: 220px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    box-shadow: 0 8px 32px rgba(15,110,86,0.10);
  }
  #done-card span { font-size: 48px; }
  #done-card p { font-size: 22px; font-weight: 600; color: #0F6E56; }

  #bottom-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1.5rem;
    width: 100%;
    max-width: 560px;
  }
  .btn-next {
    background: #1a6bbf;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 44px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    flex: 1;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-next:hover { background: #1558a0; }
  .btn-next:active { transform: scale(0.97); }
  .btn-next:disabled { background: #b5d4f4; cursor: not-allowed; }

  #progress-bar-wrap {
    width: 100%;
    max-width: 560px;
    height: 6px;
    background: #b5d4f4;
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: #1a6bbf;
    border-radius: 99px;
    transition: width 0.3s;
  }
</style>

<div id="app">
  <div id="title-screen">
    <div>
      <div id="title-text">BINGO</div>
      <div id="title-sub">Verb Flashcards</div>
    </div>
    <button class="btn-primary" id="begin-btn" onclick="beginGame()">BEGIN</button>
  </div>

  <div id="card-screen">
    <div id="top-bar">
      <button class="btn-secondary" onclick="beginGame()">↺ Begin Again</button>
      <span id="counter">1 / 50</span>
      <button class="btn-secondary" onclick="reshuffle()">⇄ Reshuffle</button>
    </div>

    <div id="progress-bar-wrap">
      <div id="progress-bar" style="width:2%"></div>
    </div>

    <div id="card-area">
      <div id="card">
        <div id="verb">Be</div>
      </div>
      <div id="done-card">
        <span>🎉</span>
        <p>All cards done!</p>
      </div>
    </div>

    <div id="card-hint">Swipe right or tap Next →</div>

    <div id="bottom-bar">
      <button class="btn-next" id="next-btn" onclick="nextCard()">Next →</button>
    </div>
  </div>
</div>

<script>
const VERBS = ["Be","Do","Go","See","Had","Take","Make","Give","Come","Know","Find","Write","Eat","Drink","Run","Break","Choose","Forget","Speak","Steal","Drive","Wear","Buy","Bring","Catch","Sleep","Keep","Leave","Meet","Read","Say","Sell","Send","Seek","Think","Understand","Win","Lose","Build","Feel","Hear","Pay","Spend","Tell","Cut","Hit","Hurt","Put","Set","Fall"];

let deck = [];
let current = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function beginGame() {
  deck = shuffle(VERBS);
  current = 0;
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('card-screen').style.display = 'flex';
  showCard(false);
}

function reshuffle() {
  deck = shuffle(VERBS);
  current = 0;
  showCard(false);
}

function showCard(animate) {
  const card = document.getElementById('card');
  const doneCard = document.getElementById('done-card');
  const nextBtn = document.getElementById('next-btn');

  if (current >= deck.length) {
    card.style.display = 'none';
    doneCard.style.display = 'flex';
    nextBtn.disabled = true;
    document.getElementById('counter').textContent = `${deck.length} / ${deck.length}`;
    document.getElementById('progress-bar').style.width = '100%';
    return;
  }

  card.style.display = 'flex';
  doneCard.style.display = 'none';
  nextBtn.disabled = false;

  document.getElementById('verb').textContent = deck[current];
  document.getElementById('counter').textContent = `${current + 1} / ${deck.length}`;
  document.getElementById('progress-bar').style.width = `${((current + 1) / deck.length) * 100}%`;

  if (animate) {
    card.classList.remove('fly-right', 'fly-left', 'entrance');
    void card.offsetWidth;
    card.classList.add('entrance');
  }
}

function nextCard(dir = 'right') {
  if (current >= deck.length) return;
  const card = document.getElementById('card');
  const flyClass = dir === 'right' ? 'fly-right' : 'fly-left';
  card.classList.add(flyClass);
  setTimeout(() => {
    card.classList.remove(flyClass);
    current++;
    showCard(true);
  }, 280);
}

// Swipe support
let startX = 0;
let startY = 0;
let isDragging = false;
const card = document.getElementById('card');

card.addEventListener('pointerdown', e => {
  startX = e.clientX;
  startY = e.clientY;
  isDragging = true;
  card.classList.add('dragging');
  card.setPointerCapture(e.pointerId);
});

card.addEventListener('pointermove', e => {
  if (!isDragging) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  card.style.transform = `translateX(${dx * 0.4}px) rotate(${dx * 0.03}deg)`;
});

card.addEventListener('pointerup', e => {
  if (!isDragging) return;
  isDragging = false;
  card.classList.remove('dragging');
  card.style.transform = '';
  const dx = e.clientX - startX;
  const dy = Math.abs(e.clientY - startY);
  if (Math.abs(dx) > 60 && dy < 80) {
    nextCard(dx > 0 ? 'right' : 'left');
  }
});

card.addEventListener('pointercancel', () => {
  isDragging = false;
  card.classList.remove('dragging');
  card.style.transform = '';
});
</script>
